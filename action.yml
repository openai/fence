name: Fence
description: Launch the bundled Fence Linux x64 agent on a supported GitHub-hosted runner
inputs:
  config:
    description: Optional inline strict JSON Fence configuration; omission selects strict standard block with an empty allowlist
    required: false
  mode:
    description: Optional zero-config mode, either block or audit; may not be combined with config
    required: false
runs:
  using: node24
  main: action/main.cts
  post: action/post.cts
  post-if: always()
