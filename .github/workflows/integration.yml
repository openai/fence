name: integration

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

defaults:
  run:
    shell: bash

concurrency:
  # A stranded host-block evidence job may be unable to receive cancellation.
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.sha }}
  cancel-in-progress: true

jobs:
  lockdown:
    name: lockdown ${{ matrix.scenario }} evidence
    strategy:
      fail-fast: false
      matrix:
        scenario: [audit, rollback, unsafe-preserve]
    runs-on: ubuntu-24.04

    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pin@v6.0.2
        with:
          persist-credentials: false

      - name: validate locks
        run: script/validate-locks --ci

      - name: observe hosted runner fingerprint candidate
        run: script/observe-hosted-runner

      - name: prepare rust
        run: script/prepare-rust

      - name: bootstrap
        run: script/bootstrap

      - name: test lockdown evidence
        run: script/test-lockdown "${{ matrix.scenario }}"

  selected-profile-runtime:
    name: selected profile runtime ${{ matrix.scenario }}
    strategy:
      fail-fast: false
      matrix:
        scenario: [healthy, worker-failure]
    timeout-minutes: 8
    runs-on: ubuntu-24.04

    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pin@v6.0.2
        with:
          persist-credentials: false

      - name: validate locks
        run: script/validate-locks --ci

      - name: observe hosted runner fingerprint candidate
        run: script/observe-hosted-runner

      - name: prepare rust
        run: script/prepare-rust

      - name: bootstrap
        run: script/bootstrap

      - name: run selected profile runtime evidence
        env:
          SELECTED_PROFILE_RUNTIME_REPLICA: ${{ matrix.scenario }}
        run: script/test-selected-profile-runtime "${{ matrix.scenario }}"

      - name: emit bounded late selected profile evidence
        if: ${{ matrix.scenario == 'healthy' }}
        env:
          SELECTED_PROFILE_RUNTIME_REPLICA: ${{ matrix.scenario }}
        run: script/report-selected-profile-runtime

  protected-run:
    name: protected ${{ matrix.scenario }} ${{ matrix.replica }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - scenario: standard
            replica: first-connect-1
          - scenario: standard
            replica: first-connect-2
          - scenario: standard
            replica: first-connect-3
          - scenario: standard-opt-out
            replica: required
          - scenario: unsafe-preserve
            replica: required
          - scenario: audit
            replica: required
    timeout-minutes: 8
    runs-on: ubuntu-24.04

    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pin@v6.0.2
        with:
          persist-credentials: false

      - name: validate locks
        run: script/validate-locks --ci

      - name: observe hosted runner fingerprint candidate
        run: script/observe-hosted-runner

      - name: prepare rust
        run: script/prepare-rust

      - name: bootstrap
        run: script/bootstrap

      - name: run packaged trusted-launcher block
        run: script/test-protected-run "${{ matrix.scenario }}"

  integration:
    name: integration
    needs: [lockdown, selected-profile-runtime, protected-run]
    runs-on: ubuntu-24.04

    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pin@v6.0.2
        with:
          persist-credentials: false

      - name: validate locks
        run: script/validate-locks --ci

      - name: observe hosted runner fingerprint candidate
        run: script/observe-hosted-runner

      - name: prepare rust
        run: script/prepare-rust

      - name: bootstrap
        run: script/bootstrap

      - name: test resident lifecycle evidence
        run: script/test-privileged

      - name: test standard lockdown evidence
        run: script/test-lockdown standard
