name: nightly

on:
  schedule:
    - cron: '17 9 * * *'
  workflow_dispatch:

permissions:
  actions: read
  contents: read

concurrency:
  group: nightly-ubuntu-latest
  cancel-in-progress: false

jobs:
  acceptance:
    name: ubuntu-latest action acceptance
    uses: ./.github/workflows/action-acceptance.yml
    with:
      action_ref: ${{ github.sha }}
      candidate_kind: source
      acceptance_runner: ubuntu-latest
