name: action acceptance

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

defaults:
  run:
    shell: bash

concurrency:
  # A stranded protected host job may be unable to receive cancellation.
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.sha }}
  cancel-in-progress: true

jobs:
  action:
    name: action ${{ matrix.scenario }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - scenario: standard
            mode: block
            invocation_id: action-standard
            container_policy: disable
            disable_broad_github_domains: 'false'
          - scenario: standard-opt-out
            mode: block
            invocation_id: action-standard-opt-out
            container_policy: disable
            disable_broad_github_domains: 'true'
          - scenario: unsafe-preserve
            mode: block
            invocation_id: action-unsafe-preserve
            container_policy: unsafe_preserve
            disable_broad_github_domains: 'false'
          - scenario: audit
            mode: audit
            invocation_id: action-audit
            container_policy: ''
            disable_broad_github_domains: 'false'
    timeout-minutes: 8
    runs-on: ubuntu-24.04

    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pin@v6.0.2
        with:
          persist-credentials: false

      - name: validate locks
        run: script/validate-locks --ci

      - name: observe hosted runner fingerprint candidate
        run: script/observe-hosted-runner

      - name: test Action wrapper
        run: script/test-action-wrapper

      - name: classify bundled Action host compatibility
        id: bundle-host
        run: script/classify-action-bundle-host

      - name: activate bundled Fence agent
        if: steps.bundle-host.outputs.run_bundle == 'true'
        uses: ./
        with:
          mode: ${{ matrix.mode }}
          invocation_id: ${{ matrix.invocation_id }}
          container_policy: ${{ matrix.container_policy }}
          disable_broad_github_domains: ${{ matrix.disable_broad_github_domains }}

      - name: verify Action lifecycle
        if: steps.bundle-host.outputs.run_bundle == 'true'
        run: script/test-action-acceptance "${{ matrix.scenario }}" "${{ matrix.invocation_id }}"

  zero-input:
    name: action zero-input standard
    timeout-minutes: 8
    runs-on: ubuntu-24.04

    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pin@v6.0.2
        with:
          persist-credentials: false

      - name: validate locks
        run: script/validate-locks --ci

      - name: observe hosted runner fingerprint candidate
        run: script/observe-hosted-runner

      - name: test Action wrapper
        run: script/test-action-wrapper

      - name: classify bundled Action host compatibility
        id: bundle-host
        run: script/classify-action-bundle-host

      - name: activate bundled Fence agent with strict defaults
        if: steps.bundle-host.outputs.run_bundle == 'true'
        uses: ./

      - name: verify zero-input Action lifecycle
        if: steps.bundle-host.outputs.run_bundle == 'true'
        run: script/test-action-acceptance standard "fence-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"

  nested-layout:
    name: action nested registered path
    timeout-minutes: 8
    runs-on: ubuntu-24.04

    steps:
      - name: checkout into nested Action path
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pin@v6.0.2
        with:
          path: target/action-layout/owner/project/revision
          persist-credentials: false

      - name: validate locks
        working-directory: target/action-layout/owner/project/revision
        run: script/validate-locks --ci

      - name: observe hosted runner fingerprint candidate
        working-directory: target/action-layout/owner/project/revision
        run: script/observe-hosted-runner

      - name: test Action wrapper
        working-directory: target/action-layout/owner/project/revision
        run: script/test-action-wrapper

      - name: classify bundled Action host compatibility
        id: bundle-host
        working-directory: target/action-layout/owner/project/revision
        run: script/classify-action-bundle-host

      - name: activate bundled Fence agent from nested path
        if: steps.bundle-host.outputs.run_bundle == 'true'
        uses: ./target/action-layout/owner/project/revision
        with:
          mode: audit
          invocation_id: action-nested-layout

      - name: verify nested Action lifecycle
        if: steps.bundle-host.outputs.run_bundle == 'true'
        working-directory: target/action-layout/owner/project/revision
        run: script/test-action-acceptance audit action-nested-layout

  setup-failure:
    name: action setup failure evidence
    timeout-minutes: 5
    runs-on: ubuntu-24.04

    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pin@v6.0.2
        with:
          persist-credentials: false

      - name: validate locks
        run: script/validate-locks --ci

      - name: observe hosted runner fingerprint candidate
        run: script/observe-hosted-runner

      - name: test Action wrapper
        run: script/test-action-wrapper

      - name: reject invalid setup before mutation
        run: script/test-action-setup-failure

  tamper:
    name: action registered-path and post-ready tamper evidence
    timeout-minutes: 5
    runs-on: ubuntu-24.04

    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pin@v6.0.2
        with:
          persist-credentials: false

      - name: validate locks
        run: script/validate-locks --ci

      - name: observe hosted runner fingerprint candidate
        run: script/observe-hosted-runner

      - name: test Action wrapper
        run: script/test-action-wrapper

      - name: classify bundled Action host compatibility
        id: bundle-host
        run: script/classify-action-bundle-host

      - name: deny registered-path replacement and fail the post hook on drift
        if: steps.bundle-host.outputs.run_bundle == 'true'
        run: script/test-action-tamper

  action-finalization:
    name: action finalization ${{ matrix.replica }}
    strategy:
      fail-fast: false
      matrix:
        replica: [quiet-1, quiet-2, quiet-3]
    timeout-minutes: 8
    runs-on: ubuntu-24.04

    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pin@v6.0.2
        with:
          persist-credentials: false

      - name: validate locks
        run: script/validate-locks --ci

      - name: observe hosted runner fingerprint candidate
        run: script/observe-hosted-runner

      - name: test Action wrapper
        run: script/test-action-wrapper

      - name: classify bundled Action host compatibility
        id: bundle-host
        run: script/classify-action-bundle-host

      - name: activate bundled Fence agent without post-ready warming
        if: steps.bundle-host.outputs.run_bundle == 'true'
        uses: ./
        with:
          invocation_id: action-finalization-${{ matrix.replica }}

  verify-action-finalization:
    name: verify Action finalization
    needs: [action-finalization]
    timeout-minutes: 5
    runs-on: ubuntu-24.04
    permissions:
      actions: read
      contents: read

    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pin@v6.0.2
        with:
          persist-credentials: false

      - name: verify terminal jobs and downloadable logs
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: script/verify-protected-finalization action

  acceptance:
    name: action acceptance
    needs: [action, zero-input, nested-layout, setup-failure, tamper, verify-action-finalization]
    if: ${{ always() && !cancelled() }}
    runs-on: ubuntu-24.04

    steps:
      - name: confirm bundled Action acceptance
        env:
          ACTION_RESULT: ${{ needs.action.result }}
          ZERO_INPUT_RESULT: ${{ needs.zero-input.result }}
          NESTED_LAYOUT_RESULT: ${{ needs.nested-layout.result }}
          SETUP_FAILURE_RESULT: ${{ needs.setup-failure.result }}
          TAMPER_RESULT: ${{ needs.tamper.result }}
          FINALIZATION_RESULT: ${{ needs.verify-action-finalization.result }}
        run: |
          for result in \
            "$ACTION_RESULT" \
            "$ZERO_INPUT_RESULT" \
            "$NESTED_LAYOUT_RESULT" \
            "$SETUP_FAILURE_RESULT" \
            "$TAMPER_RESULT" \
            "$FINALIZATION_RESULT"
          do
            if [[ "$result" != "success" ]]; then
              exit 1
            fi
          done
          echo "bundled Action acceptance passed"
