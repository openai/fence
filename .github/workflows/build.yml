name: build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

defaults:
  run:
    shell: bash

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package-linux-x64:
    name: build
    runs-on: ubuntu-24.04
    env:
      BUILD_VERSION: ci

    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pin@v6.0.2
        with:
          persist-credentials: false

      - name: validate locks
        run: script/validate-locks --ci

      - name: prepare rust
        run: script/prepare-rust

      - name: bootstrap
        run: script/bootstrap

      - name: build Linux x64 package
        run: script/build --release --targets "x86_64-unknown-linux-gnu"

  retained-cross-tools:
    name: retained cross tools (${{ matrix.os }})
    strategy:
      matrix:
        os: [ubuntu-24.04, macos-14]
    runs-on: ${{ matrix.os }}

    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pin@v6.0.2
        with:
          persist-credentials: false

      - name: validate locks
        run: script/validate-locks --ci

      - name: prepare rust
        run: script/prepare-rust

      - name: install retained cross-build tools
        run: script/install-zig

      - name: verify retained cross-build tools
        run: script/verify-release-toolchain
